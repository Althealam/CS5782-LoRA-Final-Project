  <circle cx="1050" cy="210" r="22" fill="#ef4444"/>
  <text x="998" y="152" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#fee2e2">Insights</text>
  <text x="975" y="256" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#cbd5e1">Tradeoff conclusions</text>
