  <line x1="85" y1="210" x2="1110" y2="210" stroke="#334155" stroke-width="8" stroke-linecap="round"/>

  <circle cx="170" cy="210" r="22" fill="#8b5cf6"/>
  <text x="126" y="152" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#ddd6fe">Baseline</text>
  <text x="92" y="256" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#cbd5e1">Full / Frozen / LoRA</text>

  <circle cx="390" cy="210" r="22" fill="#06b6d4"/>
  <text x="337" y="152" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#cffafe">Training</text>
  <text x="332" y="256" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#cbd5e1">GLUE and MNLI runs</text>

